services:
  mongodb:
    build: ./mongodb
    image: varunkumarpinnam/mongodb:1.2.0
    container_name: mongodb
    volumes:
    - mongodb:/data/db

  catalogue:
    build: ./catalogue
    image: varunkumarpinnam/catalogue:1.2.0
    container_name: catalogue
    depends_on:
    - mongodb

  user:
    build: ./user
    image: varunkumarpinnam/user:1.2.0
    container_name: user
    depends_on:
    - mongodb
    - redis

  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data

  cart:
    build: ./cart
    image: varunkumarpinnam/cart:1.2.0
    container_name: cart
    depends_on:
    - catalogue
    - redis

  frontend:
    build: ./frontend
    image: varunkumarpinnam/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - payment
    - shipping
    
  mysql:
    build: ./mysql
    image: varunkumarpinnam/mysql:1.0.0
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql

  shipping:
    build: ./shipping
    image: varunkumarpinnam/shipping:1.2.0
    container_name: shipping
    depends_on:
    - cart
    - mysql
  
  rabbitmq:
     image: rabbitmq:3
     environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
     container_name: rabbitmq
     volumes:
     - rabbitmq:/var/lib/rabbitmq
  
  payment:
    build: ./payment
    image: varunkumarpinnam/payment:1.2.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080" 
      USER_HOST: "user" 
      USER_PORT: "8080" 
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
    - cart
    - user
    - rabbitmq

networks:
  default:
    driver: bridge
    name: roboshop
    external: false

volumes:
 mongodb:
 redis:
 mysql:
 rabbitmq:
